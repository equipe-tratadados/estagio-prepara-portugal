name: 'Code Owners Check + Auto Reviewers'

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  codeowners:
    name: 'Run Codeowners Plus'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Run Codeowners Plus'
        uses: multimediallc/codeowners-plus@v1.9.1
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          pr: '${{ github.event.pull_request.number }}'
          verbose: true
          quiet: ${{ github.event.pull_request.draft }}

      # =============================================
      # REVISORES AUTOMÁTICOS EM TODOS OS PRs
      # =============================================
      - name: 'Add reviewers to all PRs'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            
            const allReviewers = ['patriciaduarte-hub', 'zarditab', 'equipe-tratadados'];
            const reviewers = allReviewers.filter(r => r !== prAuthor);
            
            if (reviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: reviewers
              });
              console.log(`✅ Revisores adicionados: ${reviewers.join(', ')}`);
            } else {
              console.log(`⚠️ Nenhum revisor disponível (autor é o único owner)`);
            }

      # =============================================
      # 3: Adicionar labels automáticas
      # =============================================
      - name: 'Add labels for protected files'
        if: always()  # Roda mesmo se o Codeowners Plus falhar
        uses: actions/github-script@v7
        with:
          script: |
            // Pega a lista de arquivos alterados no PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            // Lista de arquivos protegidos (igual ao .codeowners)
            const protectedFiles = ['biblioteca.md', 'log.md', 'dicionario.md'];
            
            // Verifica se algum arquivo protegido foi alterado
            const hasProtected = files.some(file => 
              protectedFiles.some(protectedFile => 
                file.filename.includes(protectedFile) || 
                file.filename.endsWith(protectedFile)
              )
            );

            if (hasProtected) {
              // Adiciona as labels no PR
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['🔒 arquivo-protegido', '🔍 revisao-necessaria']
              });
            }

      # =============================================
      # 4: Comentário de instruções
      # =============================================
      - name: 'Add instructions comment if blocked'
        if: failure()  # Só roda se o Codeowners Plus falhou
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `
            ## ⚠️ Este Pull Request precisa de aprovação!
            
            Você alterou um **arquivo protegido** (.md). Para fazer o merge, siga os passos abaixo:
            
            ### 📋 Passos necessários:
            1. Um dos **owners** precisa revisar e aprovar este PR
            2. Owners: @patriciaduarte-hub, @zarditab, @equipe-tratadados
            3. Depois da aprovação, o status check vai passar e o merge será liberado
            
            ### 📁 Arquivos protegidos alterados:
            - biblioteca.md
            - log.md  
            - dicionario.md
            
            📖 Consulte o [guia de contribuição](CONTRIBUTING.md) para mais detalhes.
            
            ---
            *Esta mensagem foi gerada automaticamente pelo GitHub Actions.*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
